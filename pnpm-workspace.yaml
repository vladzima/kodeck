packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  '@tailwindcss/vite': ^4.2.2
  "@types/node": ^24
  '@types/react': ^19.2.14
  '@types/react-dom': ^19.2.3
  '@vitejs/plugin-react': ^6.0.1
  '@xterm/addon-fit': ^0.11.0
  '@xterm/addon-webgl': ^0.19.0
  '@xterm/xterm': ^6.0.0
  react: ^19.2.4
  react-dom: ^19.2.4
  tailwindcss: ^4.2.2
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  zustand: ^5.0.12

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
